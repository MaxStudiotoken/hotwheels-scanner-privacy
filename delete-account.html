      pointer-events:none;
      opacity:.22;

      max-width:1100px;
      margin:0 auto;
      padding:24px;
      position:relative;
      z-index:1;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      flex-wrap:wrap;
      margin-bottom:24px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:16px;
    }

    .logo{
      width:64px;
      height:64px;
      border-radius:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:30px;
      background:linear-gradient(135deg, rgba(0,229,255,.18), rgba(255,60,172,.18));
      border:1px solid rgba(255,255,255,.16);
      box-shadow:var(--glow);
      backdrop-filter:blur(10px);
    }

    .brand h1{
      margin:0;
      font-size:30px;
      letter-spacing:.3px;
      text-shadow:0 0 14px rgba(0,229,255,.15);
    }

    .brand p{
      margin:5px 0 0;
      color:var(--muted);
    }

    .lang-box{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:16px;
      padding:12px 14px;
      box-shadow:var(--glow);
      backdrop-filter:blur(12px);
    }

    .lang-box label{
      display:block;
      margin-bottom:8px;
      color:#dff7ff;
      font-size:14px;
    }

    select{
      background:#0d1530;
      color:var(--text);
      border:1px solid var(--border);
      border-radius:12px;
      padding:10px 12px;
      font-size:15px;
      min-width:210px;
      outline:none;
    }

    .card{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:22px;
      padding:28px;
      box-shadow:var(--glow);
      backdrop-filter:blur(12px);
    }

    .hero{
      display:grid;
      grid-template-columns:1.2fr .8fr;
      gap:20px;
      margin-bottom:22px;
    }

    .hero-left,.hero-right{
      background:linear-gradient(135deg, rgba(0,229,255,.08), rgba(124,77,255,.08), rgba(255,60,172,.08));
      border:1px solid rgba(255,255,255,.10);
      border-radius:20px;
      padding:20px;
    }

    .hero-title{
      font-size:28px;
      margin:0 0 10px;
      color:#fff;
    }

    .hero-sub{
      color:var(--muted);
      margin:0;
      line-height:1.7;
    }

    .pill{
      display:inline-block;
      margin:6px 8px 0 0;
      padding:7px 11px;
      border-radius:999px;
      background:rgba(0,229,255,.10);
      border:1px solid rgba(0,229,255,.20);
      color:#dffcff;
      font-size:13px;
    }

    h2{
      margin-top:30px;
      margin-bottom:10px;
      color:#fff;
      font-size:24px;
      border-bottom:1px solid rgba(255,255,255,.10);
      padding-bottom:8px;
      text-shadow:0 0 10px rgba(0,229,255,.10);
    }

    h3{
      color:#eaf1ff;
      font-size:19px;
      margin-top:22px;
      margin-bottom:10px;
    }

    p, li{
      color:var(--muted);
      line-height:1.75;
      font-size:16px;
    }

    strong{
      color:#fff;
    }

    ul{
      padding-left:22px;
    }

    .box{
      background:var(--panel2);
      border:1px solid rgba(255,255,255,.10);
      border-radius:16px;
      padding:18px;
      margin:16px 0;
    }

    .email-box{
      display:inline-block;

      border-radius:14px;
      background:rgba(0,255,157,.10);
      border:1px solid rgba(0,255,157,.25);
      color:#e9fff7;
      font-weight:bold;
      word-break:break-word;
      box-shadow:0 0 14px rgba(0,255,157,.12);

      background:rgba(255,60,172,.10);

      margin-top:28px;
      padding-top:18px;
      border-top:1px solid rgba(255,255,255,.10);
      color:var(--muted);
      font-size:14px;
    }

    a{
      color:#8dddff;
      text-decoration:none;
    }

      .hero{

      }
      .brand h1{

      }
      .card{
        padding:20px;
      }
